# Single-package workspace root (required so `pnpm install` / EAS Build work).
packages:
  - '.'

# =====================================================================
# pnpm 11+ reads these from here; pnpm 9.x uses app/.npmrc (keep in sync).
# nodeLinker: hoisted + packageImportMethod: copy — Windows CMake path fix.
# =====================================================================
nodeLinker: hoisted
packageImportMethod: copy

allowBuilds:
  dtrace-provider: true
